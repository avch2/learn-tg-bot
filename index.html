<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI Chat — Groq</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   CSS VARIABLES — THEMES
═══════════════════════════════════════════════════ */
:root {
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  /* Light (default) */
  --bg:          #F5F5F7;
  --bg-2:        #FFFFFF;
  --bg-3:        #EBEBED;
  --text:        #1C1C1E;
  --text-2:      #636366;
  --text-3:      #AEAEB2;
  --border:      rgba(0,0,0,0.08);
  --shadow:      0 2px 20px rgba(0,0,0,0.08);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.12);
  --accent:      #007AFF;
  --accent-soft: rgba(0,122,255,0.10);
  --ai-bg:       #FFFFFF;
  --user-bg:     #007AFF;
  --user-text:   #FFFFFF;
  --chip-bg:     #FFFFFF;
  --chip-brd:    rgba(0,0,0,0.08);
  --header-bg:   rgba(245,245,247,0.85);
  --stop-bg:     #FF3B30;
}

[data-theme="dark"] {
  --bg:          #000000;
  --bg-2:        #1C1C1E;
  --bg-3:        #2C2C2E;
  --text:        #FFFFFF;
  --text-2:      #AEAEB2;
  --text-3:      #636366;
  --border:      rgba(255,255,255,0.08);
  --shadow:      0 2px 20px rgba(0,0,0,0.4);
  --shadow-lg:   0 8px 40px rgba(0,0,0,0.6);
  --accent:      #0A84FF;
  --accent-soft: rgba(10,132,255,0.15);
  --ai-bg:       #1C1C1E;
  --user-bg:     #0A84FF;
  --user-text:   #FFFFFF;
  --chip-bg:     #1C1C1E;
  --chip-brd:    rgba(255,255,255,0.08);
  --header-bg:   rgba(0,0,0,0.80);
  --stop-bg:     #FF453A;
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  transition: background .3s, color .3s;
}

/* ═══════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 700px;
  margin: 0 auto;
  position: relative;
}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
#header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 10;
  transition: background .3s, border-color .3s;
}

.header-logo {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-info { flex: 1; min-width: 0; }

.header-title {
  font-weight: 700;
  font-size: 15px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-subtitle {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.2;
}

.header-actions { display: flex; gap: 6px; flex-shrink: 0; }

.icon-btn {
  width: 34px; height: 34px;
  border-radius: var(--radius-xs);
  border: none;
  background: var(--bg-3);
  color: var(--text);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: background .2s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { transform: scale(.92); }
.icon-btn:hover  { background: var(--border); }

/* ═══════════════════════════════════════════════════
   ROLE SELECTOR
═══════════════════════════════════════════════════ */
#role-bar {
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
  transition: background .3s, border-color .3s;
}
#role-bar::-webkit-scrollbar { display: none; }

.role-chip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.role-chip.active {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent);
}
.role-chip:active { transform: scale(.94); }

/* ═══════════════════════════════════════════════════
   CHAT AREA
═══════════════════════════════════════════════════ */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 2px; }

/* ═══════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════ */
#empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 24px 16px;
  text-align: center;
}

.empty-icon {
  width: 68px; height: 68px;
  border-radius: 20px;
  background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
}

.empty-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.empty-sub {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.5;
  max-width: 260px;
}

.quick-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 340px;
}

.quick-chip {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  background: var(--chip-bg);
  border: 1.5px solid var(--chip-brd);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  line-height: 1.35;
  transition: all .2s;
  box-shadow: var(--shadow);
  -webkit-tap-highlight-color: transparent;
}
.quick-chip:active { transform: scale(.95); }
.quick-chip:hover  { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════════════
   MESSAGES
═══════════════════════════════════════════════════ */
.msg-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  animation: fadeSlide .25s ease both;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user  { align-items: flex-end; }
.msg-row.ai    { align-items: flex-start; }

.bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 15px;
  line-height: 1.55;
  word-break: break-word;
  position: relative;
}

.msg-row.user .bubble {
  background: var(--user-bg);
  color: var(--user-text);
  border-bottom-right-radius: 4px;
}

.msg-row.ai .bubble {
  background: var(--ai-bg);
  color: var(--text);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
}

/* Code blocks inside AI */
.bubble pre {
  background: var(--bg-3);
  border-radius: var(--radius-xs);
  padding: 10px 12px;
  overflow-x: auto;
  font-size: 13px;
  margin: 8px 0;
  font-family: 'SF Mono', Consolas, monospace;
}
.bubble code {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 13px;
  background: var(--bg-3);
  padding: 1px 5px;
  border-radius: 4px;
}
.bubble pre code { background: transparent; padding: 0; }

/* Typing cursor */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent);
  border-radius: 1px;
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Copy button */
.copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 28px; height: 28px;
  border-radius: 8px;
  border: none;
  background: var(--bg-3);
  color: var(--text-2);
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s, background .2s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.msg-row.ai .bubble:hover .copy-btn,
.msg-row.ai .bubble:focus-within .copy-btn {
  opacity: 1;
}
.copy-btn:active { transform: scale(.88); }
.copy-btn.copied { background: #34C759; color: #fff; opacity: 1; }

/* Time label */
.msg-time {
  font-size: 11px;
  color: var(--text-3);
  padding: 0 4px;
}

/* ═══════════════════════════════════════════════════
   INPUT AREA
═══════════════════════════════════════════════════ */
#input-area {
  flex-shrink: 0;
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  transition: background .3s, border-color .3s;
}

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

#textarea-wrap {
  flex: 1;
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: flex-end;
  padding: 8px 12px;
  gap: 8px;
  transition: border-color .2s;
}
#textarea-wrap:focus-within {
  border-color: var(--accent);
}

#prompt {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.45;
  resize: none;
  outline: none;
  max-height: 120px;
  overflow-y: auto;
  scrollbar-width: none;
}
#prompt::-webkit-scrollbar { display: none; }
#prompt::placeholder { color: var(--text-3); }

.send-btn, .stop-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  flex-shrink: 0;
  transition: background .2s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}

.send-btn {
  background: var(--accent);
  color: #fff;
}
.send-btn:disabled { background: var(--bg-3); color: var(--text-3); cursor: not-allowed; }
.send-btn:not(:disabled):active { transform: scale(.88); }

.stop-btn {
  background: var(--stop-bg);
  color: #fff;
}
.stop-btn:active { transform: scale(.88); }

/* ═══════════════════════════════════════════════════
   SCROLL-TO-BOTTOM BUTTON
═══════════════════════════════════════════════════ */
#scroll-btn {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 7px 16px;
  border-radius: 999px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-lg);
  z-index: 5;
  display: none;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
#scroll-btn.visible { display: block; animation: popIn .2s ease; }
@keyframes popIn { from{transform:translateX(-50%) scale(.8);opacity:0} to{transform:translateX(-50%) scale(1);opacity:1} }

/* ═══════════════════════════════════════════════════
   TYPING INDICATOR
═══════════════════════════════════════════════════ */
.typing-dots {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 14px;
}
.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-3);
  animation: dotBounce 1.3s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes dotBounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--text);
  color: var(--bg);
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div id="app">

  <!-- ── HEADER ────────────────────────────────────── -->
  <div id="header">
    <div class="header-logo">🤖</div>
    <div class="header-info">
      <div class="header-title" id="header-title">AI Assistant</div>
      <div class="header-subtitle" id="header-sub">LLaMA 3.3 70B · Groq</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="exportChat()" title="Экспорт">💾</button>
      <button class="icon-btn" onclick="clearChat()" title="Очистить">🗑️</button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Тема">🌙</button>
    </div>
  </div>

  <!-- ── ROLE BAR ──────────────────────────────────── -->
  <div id="role-bar">
    <button class="role-chip active" data-role="assistant"  onclick="setRole(this)">🧠 Ассистент</button>
    <button class="role-chip"        data-role="coder"      onclick="setRole(this)">💻 Программист</button>
    <button class="role-chip"        data-role="translator" onclick="setRole(this)">🌐 Переводчик</button>
    <button class="role-chip"        data-role="writer"     onclick="setRole(this)">✍️ Писатель</button>
    <button class="role-chip"        data-role="coach"      onclick="setRole(this)">🎯 Коуч</button>
  </div>

  <!-- ── CHAT ─────────────────────────────────────── -->
  <div id="chat">
    <!-- Empty state -->
    <div id="empty">
      <div class="empty-icon">✨</div>
      <div class="empty-title">Чем могу помочь?</div>
      <div class="empty-sub">Задайте вопрос или выберите подсказку ниже</div>
      <div class="quick-chips">
        <button class="quick-chip" onclick="sendQuick(this)">📝 Объясни квантовые вычисления простыми словами</button>
        <button class="quick-chip" onclick="sendQuick(this)">💡 Придумай 5 идей для стартапа в 2025 году</button>
        <button class="quick-chip" onclick="sendQuick(this)">🐍 Напиши функцию сортировки на Python</button>
        <button class="quick-chip" onclick="sendQuick(this)">✉️ Помоги написать деловое письмо партнёру</button>
      </div>
    </div>
  </div>

  <!-- ── SCROLL-TO-BOTTOM ──────────────────────────── -->
  <button id="scroll-btn" onclick="scrollToBottom(true)">↓ Новые сообщения</button>

  <!-- ── INPUT ─────────────────────────────────────── -->
  <div id="input-area">
    <div class="input-row">
      <div id="textarea-wrap">
        <textarea id="prompt" rows="1" placeholder="Напишите сообщение…"
          onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>↑</button>
      <button class="stop-btn" id="stop-btn" onclick="stopGeneration()" style="display:none">■</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const GROQ_API_KEY = 'gsk_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX'; // ← вставьте ваш ключ
const MODEL        = 'llama-3.3-70b-versatile';
const API_URL      = 'https://api.groq.com/openai/v1/chat/completions';

/* ═══════════════════════════════════════════════════
   SYSTEM PROMPTS ПО РОЛЯМ
═══════════════════════════════════════════════════ */
const ROLES = {
  assistant: {
    label: 'AI Assistant',
    prompt: 'Ты умный и полезный ИИ-ассистент. Отвечай чётко, дружелюбно и по делу. Используй markdown где уместно.'
  },
  coder: {
    label: '💻 Программист',
    prompt: 'Ты опытный senior-разработчик. Пиши чистый, хорошо комментированный код. Объясняй решения, предлагай лучшие практики, указывай на потенциальные баги.'
  },
  translator: {
    label: '🌐 Переводчик',
    prompt: 'Ты профессиональный переводчик. Переводи точно, сохраняя стиль и нюансы оригинала. Если не указан целевой язык — переводи на английский/русский в зависимости от исходного текста.'
  },
  writer: {
    label: '✍️ Писатель',
    prompt: 'Ты талантливый писатель и редактор. Помогаешь с написанием текстов, улучшением стиля, структурой нарративов. Пиши живо, образно, с вниманием к деталям.'
  },
  coach: {
    label: '🎯 Коуч',
    prompt: 'Ты мотивационный коуч и ментор. Помогаешь ставить цели, преодолевать блоки, развивать мышление. Задавай сильные вопросы, давай практичные советы, поддерживай и вдохновляй.'
  }
};

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let messages        = [];     // история {role, content}
let currentRole     = 'assistant';
let isGenerating    = false;
let abortController = null;
let autoScroll      = true;   // умный автоскролл

/* ═══════════════════════════════════════════════════
   TELEGRAM WEBAPP INIT
═══════════════════════════════════════════════════ */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  // Синхронизируем тему с Telegram
  if (tg.colorScheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

/* ═══════════════════════════════════════════════════
   THEME TOGGLE
═══════════════════════════════════════════════════ */
function toggleTheme() {
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  root.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
}

/* ═══════════════════════════════════════════════════
   ROLE SELECTOR
═══════════════════════════════════════════════════ */
function setRole(btn) {
  document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentRole = btn.dataset.role;
  const role  = ROLES[currentRole];
  document.getElementById('header-title').textContent = role.label;
  // Сбрасываем контекст при смене роли
  messages = [];
  showToast(`Роль: ${role.label}`);
}

/* ═══════════════════════════════════════════════════
   AUTO-GROW TEXTAREA
═══════════════════════════════════════════════════ */
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  const btn = document.getElementById('send-btn');
  btn.disabled = !el.value.trim() || isGenerating;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
    e.preventDefault();
    sendMessage();
  }
}

/* ═══════════════════════════════════════════════════
   SCROLL LOGIC
═══════════════════════════════════════════════════ */
const chatEl   = document.getElementById('chat');
const scrollBtn = document.getElementById('scroll-btn');

chatEl.addEventListener('scroll', () => {
  const distFromBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight;
  autoScroll = distFromBottom < 60;
  scrollBtn.classList.toggle('visible', !autoScroll && isGenerating);
});

function scrollToBottom(force = false) {
  if (force || autoScroll) {
    chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
    autoScroll = true;
    scrollBtn.classList.remove('visible');
  }
}

/* ═══════════════════════════════════════════════════
   QUICK CHIPS
═══════════════════════════════════════════════════ */
function sendQuick(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/, '').trim();
  document.getElementById('prompt').value = text;
  autoGrow(document.getElementById('prompt'));
  sendMessage();
}

/* ═══════════════════════════════════════════════════
   RENDER MESSAGE ROW
═══════════════════════════════════════════════════ */
function createMsgRow(role) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });

  if (role === 'ai') {
    // Copy button
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '📋';
    copyBtn.title = 'Копировать';
    copyBtn.onclick = () => copyBubble(copyBtn, bubble);
    bubble.appendChild(copyBtn);
  }

  row.appendChild(bubble);
  row.appendChild(time);
  return { row, bubble };
}

function copyBubble(btn, bubble) {
  const text = bubble.innerText.replace(/📋$/, '').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋';
      btn.classList.remove('copied');
    }, 1800);
  });
}

/* ═══════════════════════════════════════════════════
   RENDER MARKDOWN (lightweight)
═══════════════════════════════════════════════════ */
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="language-${lang}">${escHtml(code.trimEnd())}</code></pre>`
  );
  // Inline code
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3 style="font-size:15px;margin:8px 0 4px">$1</h3>');
  text = text.replace(/^## (.+)$/gm,  '<h2 style="font-size:16px;margin:10px 0 4px">$1</h2>');
  text = text.replace(/^# (.+)$/gm,   '<h1 style="font-size:17px;margin:10px 0 4px">$1</h1>');
  // Bullets
  text = text.replace(/^\s*[-*] (.+)$/gm, '<li style="margin-left:16px">$1</li>');
  text = text.replace(/(<li.*<\/li>)/gs, '<ul style="padding:4px 0">$1</ul>');
  // Paragraphs
  text = text.replace(/\n{2,}/g, '<br><br>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════════════════ */
async function sendMessage() {
  const promptEl = document.getElementById('prompt');
  const text     = promptEl.value.trim();
  if (!text || isGenerating) return;

  // Hide empty state
  document.getElementById('empty').style.display = 'none';

  // Add user message
  messages.push({ role: 'user', content: text });
  const { row: userRow, bubble: userBubble } = createMsgRow('user');
  userBubble.textContent = text;
  chatEl.appendChild(userRow);

  // Reset input
  promptEl.value = '';
  promptEl.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  scrollToBottom(true);

  // Show typing indicator
  const typingRow = document.createElement('div');
  typingRow.className = 'msg-row ai';
  typingRow.innerHTML = `<div class="bubble ai-typing"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(typingRow);
  scrollToBottom(true);

  await streamResponse(typingRow);
}

/* ═══════════════════════════════════════════════════
   STREAMING RESPONSE
═══════════════════════════════════════════════════ */
async function streamResponse(typingRow) {
  setGenerating(true);

  const { row: aiRow, bubble: aiBubble } = createMsgRow('ai');
  let fullText = '';

  // Cursor
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  aiBubble.appendChild(cursor);

  // Replace typing indicator
  chatEl.replaceChild(aiRow, typingRow);
  scrollToBottom(true);

  abortController = new AbortController();

  const systemPrompt = ROLES[currentRole]?.prompt || ROLES.assistant.prompt;

  try {
    const res = await fetch(API_URL, {
      method:  'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${GROQ_API_KEY}`,
      },
      body: JSON.stringify({
        model:       MODEL,
        messages:    [{ role: 'system', content: systemPrompt }, ...messages],
        stream:      true,
        temperature: 0.7,
        max_tokens:  4096,
      }),
      signal: abortController.signal,
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;

        try {
          const json  = JSON.parse(raw);
          const delta = json.choices?.[0]?.delta?.content || '';
          if (delta) {
            fullText += delta;
            // Remove cursor, set html, re-add cursor
            cursor.remove();
            aiBubble.innerHTML = renderMarkdown(fullText);
            // Re-add copy button
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = '📋';
            copyBtn.onclick = () => copyBubble(copyBtn, aiBubble);
            aiBubble.appendChild(copyBtn);
            aiBubble.appendChild(cursor);
            scrollToBottom();
          }
        } catch { /* skip bad chunk */ }
      }
    }

  } catch (e) {
    if (e.name === 'AbortError') {
      fullText = fullText || '(генерация остановлена)';
    } else {
      fullText = `⚠️ Ошибка: ${e.message}`;
    }
    cursor.remove();
    aiBubble.innerHTML = renderMarkdown(fullText);
  } finally {
    // Remove cursor
    cursor.remove();
    // Final render without cursor
    aiBubble.innerHTML = renderMarkdown(fullText);
    // Re-add copy btn
    const copyBtn2 = document.createElement('button');
    copyBtn2.className = 'copy-btn';
    copyBtn2.textContent = '📋';
    copyBtn2.onclick = () => copyBubble(copyBtn2, aiBubble);
    aiBubble.appendChild(copyBtn2);

    // Add to history
    messages.push({ role: 'assistant', content: fullText });

    setGenerating(false);
    scrollToBottom();
    document.getElementById('prompt').focus();
  }
}

/* ═══════════════════════════════════════════════════
   STOP GENERATION
═══════════════════════════════════════════════════ */
function stopGeneration() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
}

/* ═══════════════════════════════════════════════════
   GENERATING STATE
═══════════════════════════════════════════════════ */
function setGenerating(state) {
  isGenerating = state;
  document.getElementById('send-btn').style.display = state ? 'none' : 'flex';
  document.getElementById('stop-btn').style.display = state ? 'flex' : 'none';
  document.getElementById('prompt').disabled = state;
  if (!state) {
    scrollBtn.classList.remove('visible');
    autoScroll = true;
  }
}

/* ═══════════════════════════════════════════════════
   CLEAR CHAT
═══════════════════════════════════════════════════ */
function clearChat() {
  messages = [];
  // Remove all msg-row elements
  chatEl.querySelectorAll('.msg-row').forEach(r => r.remove());
  // Show empty state
  document.getElementById('empty').style.display = '';
  showToast('Чат очищен');
}

/* ═══════════════════════════════════════════════════
   EXPORT CHAT
═══════════════════════════════════════════════════ */
function exportChat() {
  if (!messages.length) { showToast('Нет сообщений для экспорта'); return; }
  const role  = ROLES[currentRole]?.label || 'AI';
  const lines = [`=== AI Chat Export ===`, `Роль: ${role}`, `Дата: ${new Date().toLocaleString('ru')}`, '', ''];

  messages.forEach(m => {
    const who = m.role === 'user' ? '👤 Вы' : `🤖 ${role}`;
    lines.push(`${who}:\n${m.content}\n`);
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `chat_${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Чат экспортирован 💾');
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════════════
   TEXTAREA: enable send on input
═══════════════════════════════════════════════════ */
document.getElementById('prompt').addEventListener('input', function() {
  document.getElementById('send-btn').disabled = !this.value.trim() || isGenerating;
});

/* ═══════════════════════════════════════════════════
   KEYBOARD RESIZE (iOS safe-area fix)
═══════════════════════════════════════════════════ */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.getElementById('app').style.height = window.visualViewport.height + 'px';
  });
}
</script>
